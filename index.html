<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omar's HSK Hub - منصة تعلم الصينية</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.3/dist/hanzi-writer.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary-red: #DE2910; --bg-color: #F5F7FA; --text-dark: #2C3E50; --hsk1: #27ae60; --hsk2: #2980b9; --hsk3: #f39c12; --hsk4: #e67e22; --hsk5: #c0392b; --hsk6: #8e44ad; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }
        
        /* Login Screen */
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary-red), #8B0000); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary-red); color: white; }
        
        /* Sidebar & Main */
        .sidebar { width: 260px; background: white; border-left: 1px solid #eee; padding: 20px; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .view-section { display: none; } .view-section.active { display: block; }
        
        /* Vocab Cards */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .vocab-card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05); transition: 0.2s; }
        .vocab-card:hover { transform: translateY(-3px); }
        .char-display { font-family: 'Noto Sans SC'; font-size: 2.4rem; }
        .pinyin-display { color: var(--primary-red); font-weight: bold; }
        
        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; text-align: center; width: 90%; max-width: 450px; }
        
        /* Voice Feedback */
        .voice-feedback { margin-top: 10px; padding: 10px; border-radius: 8px; font-weight: bold; display: none; }
        .voice-correct { background: #d4edda; color: #155724; }
        
        /* Writer */
        #writer-target { width: 250px; height: 250px; margin: 15px auto; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1 style="color:var(--primary-red); margin-bottom:20px;">Omar's HSK Hub</h1>
            <input type="email" id="loginEmail" class="login-input" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" class="login-input" placeholder="كلمة المرور">
            <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="login()">دخول</button>
            <p style="margin-top:15px; cursor:pointer; color:var(--primary-red);" onclick="showForgotPassword()">نسيت كلمة المرور؟</p>
            <p style="margin-top:10px; font-size:0.9rem;">ليس لديك حساب؟ <a href="#" onclick="showCreateAccount()" style="color:var(--primary-red);">إنشاء حساب جديد</a></p>
        </div>
    </div>

    <!-- Create Account Modal -->
    <div id="createModal" class="modal-overlay">
        <div class="modal-content">
            <h3>إنشاء حساب جديد</h3>
            <input type="text" id="createName" class="login-input" placeholder="الاسم الكامل">
            <input type="email" id="createEmail" class="login-input" placeholder="البريد الإلكتروني">
            <input type="password" id="createPass" class="login-input" placeholder="كلمة المرور">
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="createAccount()">إنشاء</button>
            <button class="btn btn-primary" style="background:#ccc; margin-top:10px; width:100%;" onclick="closeCreateModal()">إغلاق</button>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal-overlay">
        <div class="modal-content">
            <h3>استعادة كلمة المرور</h3>
            <p style="font-size:0.9rem; color:#666; margin-bottom:15px;">أدخل بريدك لإرسال الرمز</p>
            <input type="email" id="resetEmail" class="login-input" placeholder="بريدك الإلكتروني">
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="sendOTP()">إرسال الرمز</button>
            
            <div id="otpSection" style="display:none; margin-top:15px;">
                <input type="text" id="otpInput" class="login-input" placeholder="أدخل الرمز هنا">
                <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="verifyOTP()">تحقق</button>
            </div>
            
            <div id="newPassSection" style="display:none; margin-top:15px;">
                <input type="password" id="newPass" class="login-input" placeholder="كلمة المرور الجديدة">
                <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="resetPassword()">حفظ</button>
            </div>
            
            <button class="btn btn-primary" style="background:#ccc; margin-top:15px; width:100%;" onclick="closeForgotModal()">إغلاق</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" style="display:none; height:100vh;">
        <nav class="sidebar">
            <h2 style="color:var(--primary-red); margin-bottom:20px;">القائمة</h2>
            <div onclick="loadVocab(1)" style="padding:10px; cursor:pointer; border-radius:5px;">HSK 1</div>
            <div onclick="loadVocab(2)" style="padding:10px; cursor:pointer; border-radius:5px;">HSK 2</div>
            <div onclick="loadVocab(3)" style="padding:10px; cursor:pointer; border-radius:5px;">HSK 3</div>
            <div onclick="loadVocab(4)" style="padding:10px; cursor:pointer; border-radius:5px;">HSK 4</div>
            <div onclick="loadVocab(5)" style="padding:10px; cursor:pointer; border-radius:5px;">HSK 5</div>
            <div onclick="loadVocab(6)" style="padding:10px; cursor:pointer; border-radius:5px;">HSK 6</div>
            <button onclick="logout()" style="margin-top:auto; padding:10px; background:#eee; border:none; cursor:pointer; border-radius:5px;">خروج</button>
        </nav>
        <main class="main-content">
            <h2 id="levelTitle" style="margin-bottom:20px;">اختر مستوى</h2>
            <div id="vocabContainer" class="vocab-grid">
                <p style="text-align:center; width:100%; color:#666;">جاري تحميل الكلمات...</p>
            </div>
        </main>
    </div>

    <!-- Writer Modal -->
    <div id="writerModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="writerCharTitle" style="font-family:'Noto Sans SC'; font-size:1.8rem;"></h3>
            <div id="writer-target"></div>
            <button class="btn btn-primary" style="margin-top:15px;" onclick="closeWriter()">إغلاق</button>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
          apiKey: "AIzaSyDhsLAVfRamuK4ulQNM7NQadbjnZb1ahZU",
          authDomain: "omar-hsk-hub.firebaseapp.com",
          projectId: "omar-hsk-hub",
          storageBucket: "omar-hsk-hub.firebasestorage.app",
          messagingSenderId: "548719962218",
          appId: "1:548719962218:web:f5fe7fe0a6a1c35412c213"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ==================== AUTH & OTP ====================
        let generatedOTP = "";
        
        function login() {
            const e = document.getElementById('loginEmail').value;
            const p = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(e, p).then(() => {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                loadVocab(1);
            }).catch(err => alert("خطأ: " + err.message));
        }

        function showCreateAccount() { document.getElementById('createModal').style.display = 'flex'; }
        function closeCreateModal() { document.getElementById('createModal').style.display = 'none'; }

        function createAccount() {
            const name = document.getElementById('createName').value;
            const email = document.getElementById('createEmail').value;
            const pass = document.getElementById('createPass').value;
            
            if(!name || !email || !pass) { alert("املأ جميع الحقول"); return; }
            
            auth.createUserWithEmailAndPassword(email, pass).then(() => {
                alert("تم إنشاء الحساب بنجاح!");
                closeCreateModal();
            }).catch(err => alert(err.message));
        }

        function showForgotPassword() { 
            document.getElementById('forgotModal').style.display = 'flex'; 
            document.getElementById('otpSection').style.display = 'none';
            document.getElementById('newPassSection').style.display = 'none';
        }
        function closeForgotModal() { document.getElementById('forgotModal').style.display = 'none'; }

        function sendOTP() {
            const email = document.getElementById('resetEmail').value;
            if(!email) { alert("أدخل البريد أولاً"); return; }
            
            // محاكاة إرسال OTP
            generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();
            alert(`[محاكاة] رمز التحقق هو: ${generatedOTP}`);
            document.getElementById('otpSection').style.display = 'block';
        }

        function verifyOTP() {
            if(document.getElementById('otpInput').value === generatedOTP) {
                document.getElementById('otpSection').style.display = 'none';
                document.getElementById('newPassSection').style.display = 'block';
            } else {
                alert("رمز خاطئ");
            }
        }

        function resetPassword() {
            const newP = document.getElementById('newPass').value;
            if(newP.length < 6) { alert("كلمة المرور قصيرة"); return; }
            auth.currentUser.updatePassword(newP).then(() => {
                alert("تم التغيير بنجاح");
                closeForgotModal();
            }).catch(err => alert(err.message));
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // ==================== VOCABULARY LOADING ====================
        let VOCAB_DATA = {};

        fetch('hsk-full-data.json')
            .then(response => {
                if (!response.ok) throw new Error("Network response was not ok");
                return response.json();
            })
            .then(data => {
                VOCAB_DATA = data;
                console.log("Vocabulary loaded successfully!");
                // Load level 1 by default if user is logged in
                if(document.getElementById('mainApp').style.display === 'flex') {
                    loadVocab(1);
                }
            })
            .catch(error => {
                console.error('Error loading vocab:', error);
                document.getElementById('vocabContainer').innerHTML = '<p style="color:red; text-align:center;">حدث خطأ أثناء تحميل الكلمات. تأكد من وجود ملف hsk-full-data.json في نفس المجلد.</p>';
            });

        function loadVocab(level) {
            document.getElementById('levelTitle').innerText = `مفردات HSK ${level}`;
            const container = document.getElementById('vocabContainer');
            container.innerHTML = '';
            
            if (!VOCAB_DATA[level]) {
                container.innerHTML = '<p>جاري تحميل البيانات أو المستوى فارغ...</p>';
                return;
            }

            const words = VOCAB_DATA[level];
            
            words.forEach(w => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.innerHTML = `
                    <div class="char-display">${w.char}</div>
                    <div class="pinyin-display">${w.pinyin}</div>
                    <div>${w.mean}</div>
                    <div style="margin-top:10px; display:flex; gap:5px; justify-content:center;">
                        <button class="btn btn-primary" style="font-size:0.8rem; padding:5px 10px;" onclick="playVoice('${w.pinyin}', this)">🔊 استمع</button>
                        <button class="btn btn-primary" style="font-size:0.8rem; padding:5px 10px; background:#2980b9;" onclick="openWriter('${w.char}')">✍️ كتابة</button>
                    </div>
                    <div class="voice-feedback"></div>
                `;
                container.appendChild(card);
            });
        }

        function playVoice(text, btn) {
            const feedback = btn.parentElement.nextElementSibling;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            
            utterance.onend = () => {
                feedback.style.display = 'block';
                feedback.className = 'voice-feedback voice-correct';
                feedback.innerText = '✅ تم النطق! حاول تكراره.';
                setTimeout(() => { feedback.style.display = 'none'; }, 3000);
            };
            
            speechSynthesis.speak(utterance);
        }

        let writer = null;
        function openWriter(char) {
            document.getElementById('writerModal').style.display = 'flex';
            document.getElementById('writerCharTitle').innerText = char;
            if(writer) writer.destroy();
            writer = HanziWriter.create('writer-target', char, { width: 250, height: 250, padding: 5 });
            writer.animateCharacter();
        }
        function closeWriter() { document.getElementById('writerModal').style.display = 'none'; }
    </script>
</body>
</html>
